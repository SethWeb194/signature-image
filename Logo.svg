<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="smartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/> <stop offset="50%" stop-color="#7000ff"/> <stop offset="100%" stop-color="#ff007a"/> </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Default: High contrast for Light Tabs */
    path {
      stroke: url(#smartGrad);
      filter: none;
    }

    /* Dark Mode: Add a glow to make the colors "pop" against dark tabs */
    @media (prefers-color-scheme: dark) {
      path { 
        filter: url(#glow);
        stroke-width: 11; /* Slightly thicker for better visibility */
      }
    }
  </style>

  <path d="M15 15h34L32 49" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" stroke="url(#smartGrad)"/>
</svg>